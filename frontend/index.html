<!DOCTYPE html>
<html>
<head>
  <title>Groww Stock Analyser</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Groww Watchlist</h2>
    </div>

    <div class="watchlist-selector">
      <button class="tab-btn active" data-list="list1">Watchlist 1</button>
      <button class="tab-btn" data-list="list2">Watchlist 2</button>
      <button class="tab-btn" data-list="list3">Watchlist 3</button>
    </div>

    <div class="category-group">
      <label for="listLabel" class="file-label">List Category/Description</label>
      <input type="text" id="listLabel" placeholder="e.g. Auto, Finance, IT Stocks">
    </div>

    <div class="input-group">
      <div class="suggestion-wrapper">
        <input type="text" id="companyInput" placeholder="Search company to add..." autocomplete="off">
        <div id="suggestionList" class="suggestions-list"></div>
      </div>
      <button id="addBtn">Add</button>
    </div>

    <ul id="watchlist"></ul>

    <div class="actions">
      <div id="serverStatus" style="font-size:13px; color:#888; text-align:center; margin-bottom:8px; min-height:1.2em;"></div>
      <button id="downloadBtn" class="primary">Download PDF Report</button>
    </div>

    <hr class="divider">

    <h3>AI Analysis (Gemini API)</h3>
    <div class="analysis-group">
      <div>
        <label for="apiKey" class="file-label">1. Enter Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="Paste key from AI Studio" class="file-input" style="padding: 8px;">
      </div>

      <div>
        <label for="pdfInput" class="file-label">2. Select PDF File</label>
        <input type="file" id="pdfInput" accept="application/pdf" class="file-input">
      </div>

      <button id="analyzeBtn" class="analyze-btn">
        3. Analyze with Gemini 2.5 Flash
      </button>
    </div>

    <div id="status"></div>
    <div id="resultArea" style="margin-top: 15px; white-space: pre-wrap; font-size: 12px; color: #333; background: #f9f9f9; padding: 10px; border-radius: 5px; display: none;"></div>
  </div>

  <script src="jspdf.umd.min.js"></script>
  <script src="jspdf.plugin.autotable.min.js"></script>
  <script src="pdf-lib.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
