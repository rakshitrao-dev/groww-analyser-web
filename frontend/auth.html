<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groww Stock Analyser — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { align-items: center; justify-content: center; padding: 20px; }

    .auth-wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .auth-logo-icon {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #fff;
    }

    .auth-logo-text { font-size: 1.4rem; font-weight: 800; color: var(--text-primary); }
    .auth-logo-text span { color: var(--accent); }

    .auth-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      box-shadow: var(--glass-shadow);
      padding: 32px;
    }

    .auth-tabs {
      display: flex;
      gap: 4px;
      background: rgba(0,0,0,0.15);
      padding: 4px;
      border-radius: 12px;
      margin-bottom: 28px;
    }

    [data-theme="light"] .auth-tabs { background: rgba(0,0,0,0.06); }

    .auth-tab {
      flex: 1;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 9px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .auth-tab.active {
      background: var(--tab-active-bg);
      border-color: var(--tab-active-border);
      color: var(--accent);
    }

    .auth-form { display: flex; flex-direction: column; gap: 16px; }

    .form-field { display: flex; flex-direction: column; gap: 6px; }

    .auth-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .auth-submit:hover { box-shadow: 0 6px 20px var(--accent-glow); transform: translateY(-1px); }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .auth-error {
      background: rgba(255, 107, 107, 0.12);
      border: 1px solid rgba(255, 107, 107, 0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #ff8080;
      display: none;
    }

    .auth-success {
      background: rgba(0, 208, 156, 0.1);
      border: 1px solid rgba(0, 208, 156, 0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--accent);
      display: none;
    }

    .auth-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    .theme-toggle-auth {
      position: fixed;
      top: 16px; right: 16px;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      backdrop-filter: blur(10px);
      z-index: 10;
      transition: all 0.2s;
    }

    .theme-toggle-auth:hover { transform: rotate(20deg) scale(1.05); }
  </style>
</head>
<body>
  <button class="theme-toggle-auth" id="themeToggle">🌙</button>

  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="auth-logo-icon">G</div>
      <div class="auth-logo-text"><span>Groww</span> Stock Analyser</div>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">Sign In</button>
        <button class="auth-tab" id="tabRegister">Create Account</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="loginForm">
        <div class="form-field">
          <label class="field-label" for="loginEmail">Email</label>
          <input type="text" id="loginEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-field">
          <label class="field-label" for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password">
        </div>
        <div class="auth-error" id="loginError"></div>
        <button type="submit" class="auth-submit" id="loginBtn">Sign In</button>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="registerForm" style="display:none">
        <div class="form-field">
          <label class="field-label" for="regName">Full Name</label>
          <input type="text" id="regName" placeholder="Rakshit Rao" autocomplete="name">
        </div>
        <div class="form-field">
          <label class="field-label" for="regEmail">Email</label>
          <input type="text" id="regEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-field">
          <label class="field-label" for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 characters" autocomplete="new-password">
        </div>
        <div class="auth-error" id="registerError"></div>
        <div class="auth-success" id="registerSuccess"></div>
        <button type="submit" class="auth-submit" id="registerBtn">Create Account</button>
      </form>
    </div>

    <div class="auth-footer">Groww Stock Analyser &nbsp;·&nbsp; Powered by Gemini 2.5 Flash</div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
