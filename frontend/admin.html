<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Groww Stock Analyser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { align-items: flex-start; padding: 0; }

    .admin-topbar {
      position: sticky; top: 0; width: 100%; z-index: 100;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 60px; flex-shrink: 0;
    }
    [data-theme="light"] .admin-topbar { background: rgba(255,255,255,0.5); }

    .admin-brand { display: flex; align-items: center; gap: 10px; }
    .admin-logo { width: 32px; height: 32px; background: #e53e3e; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: #fff; }
    .admin-title { font-size: 1rem; font-weight: 700; color: var(--text-primary); }
    .admin-title span { color: #e53e3e; }

    .admin-layout {
      width: 100%; max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 60px;
      display: flex; flex-direction: column; gap: 20px;
      position: relative; z-index: 1;
    }

    /* Login gate */
    .admin-login {
      max-width: 380px; margin: 60px auto 0;
    }

    /* Stats row */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .stat-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 20px 24px;
      display: flex; align-items: center; gap: 16px;
    }

    .stat-icon { font-size: 28px; flex-shrink: 0; }
    .stat-info .stat-num { font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1; }
    .stat-info .stat-lbl { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 4px; }

    /* Table card */
    .table-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
    }

    .table-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--divider);
      display: flex; align-items: center; justify-content: space-between;
    }

    .table-title { font-size: 0.95rem; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }

    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 10px 16px; font-size: 11px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px;
      text-align: left; background: rgba(0,0,0,0.1);
      border-bottom: 1px solid var(--divider);
    }
    [data-theme="light"] th { background: rgba(0,0,0,0.04); }
    td { padding: 12px 16px; font-size: 13px; color: var(--text-secondary); border-bottom: 1px solid var(--list-item-border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--glass-hover); }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-green { background: var(--badge-bg); color: var(--accent); border: 1px solid var(--tab-active-border); }
    .badge-gray { background: rgba(255,255,255,0.06); color: var(--text-muted); border: 1px solid var(--divider); }

    .btn-del {
      padding: 4px 10px; font-size: 11px; font-weight: 600;
      background: rgba(229,62,62,0.1); color: #fc8181;
      border: 1px solid rgba(229,62,62,0.3); border-radius: 6px;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .btn-del:hover { background: rgba(229,62,62,0.25); }

    .btn-view {
      padding: 4px 10px; font-size: 11px; font-weight: 600;
      background: var(--badge-bg); color: var(--accent);
      border: 1px solid var(--tab-active-border); border-radius: 6px;
      cursor: pointer; font-family: inherit; transition: all 0.15s; margin-right: 6px;
    }
    .btn-view:hover { background: rgba(0,208,156,0.2); }

    .refresh-btn {
      padding: 6px 14px; font-size: 12px; font-weight: 600;
      background: var(--glass-hover); border: 1px solid var(--glass-border);
      color: var(--text-primary); border-radius: 8px; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
    }
    .refresh-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 200;
      align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-via);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px;
      max-width: 600px; width: 90%;
      max-height: 80vh; overflow-y: auto;
    }
    .modal-title { font-size: 1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; display: flex; justify-content: space-between; }
    .modal-close { cursor: pointer; color: var(--text-muted); font-size: 18px; background: none; border: none; color: var(--text-secondary); }
    .wl-list-name { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin: 12px 0 6px; }
    .wl-stock { font-size: 13px; color: var(--text-secondary); padding: 4px 0; border-bottom: 1px solid var(--divider); }
    .wl-stock:last-child { border-bottom: none; }
    .wl-empty { color: var(--text-muted); font-size: 12px; font-style: italic; }

    /* Login form inside admin */
    .admin-input {
      width: 100%; padding: 11px 14px;
      background: var(--input-bg); border: 1px solid var(--input-border);
      border-radius: 10px; color: var(--text-primary); font-size: 13.5px;
      font-family: inherit; outline: none; transition: all 0.2s;
      box-sizing: border-box; margin-bottom: 12px;
    }
    .admin-input:focus { border-color: var(--input-focus); box-shadow: 0 0 0 3px var(--accent-glow); }

    .admin-login-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #e53e3e 0%, #c53030 100%);
      color: #fff; font-weight: 700; font-size: 14px; border-radius: 12px;
      border: none; cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .admin-login-btn:hover { box-shadow: 0 6px 20px rgba(229,62,62,0.35); transform: translateY(-1px); }

    .admin-err { color: #fc8181; font-size: 13px; text-align: center; margin-bottom: 8px; min-height: 18px; }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: 1fr; }
      .admin-layout { padding: 16px 12px 40px; }
      td, th { padding: 10px 12px; }
    }
  </style>
</head>
<body>
  <header class="admin-topbar">
    <div class="admin-brand">
      <div class="admin-logo">🔒</div>
      <span class="admin-title"><span>Admin</span> Dashboard</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="refresh-btn" id="refreshBtn" style="display:none">↻ Refresh</button>
      <button class="refresh-btn" id="logoutBtn" style="display:none;background:rgba(229,62,62,0.1);color:#fc8181;border-color:rgba(229,62,62,0.3)">Sign Out</button>
      <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>
  </header>

  <!-- Login Gate -->
  <div class="admin-layout" id="loginGate">
    <div class="admin-login">
      <div class="glass-card">
        <div class="card-title" style="margin-bottom:20px;justify-content:center;font-size:1.1rem">🔐 Admin Access</div>
        <div class="admin-err" id="adminErr"></div>
        <input class="admin-input" type="text" id="adminUser" placeholder="Admin email">
        <input class="admin-input" type="password" id="adminPass" placeholder="Admin password">
        <button class="admin-login-btn" id="adminLoginBtn">Access Dashboard</button>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="admin-layout" id="dashboard" style="display:none">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-info">
          <div class="stat-num" id="statTotal">—</div>
          <div class="stat-lbl">Total Users</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📋</div>
        <div class="stat-info">
          <div class="stat-num" id="statWatchlists">—</div>
          <div class="stat-lbl">Watchlists Saved</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🗄️</div>
        <div class="stat-info">
          <div class="stat-num">Free</div>
          <div class="stat-lbl">MongoDB Tier</div>
        </div>
      </div>
    </div>

    <!-- Users Table -->
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">👤 Registered Users</div>
        <span class="badge badge-green" id="userCountBadge">0 users</span>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Joined</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:24px">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Watchlist Modal -->
  <div class="modal-overlay" id="wlModal">
    <div class="modal">
      <div class="modal-title">
        <span id="wlModalTitle">Watchlists</span>
        <button class="modal-close" id="wlModalClose">✕</button>
      </div>
      <div id="wlModalBody"></div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://groww-scraper-api.onrender.com';
    let adminCreds = null;

    // Theme
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.textContent = savedTheme === 'dark' ? '🌙' : '☀️';
    themeToggle.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeToggle.textContent = next === 'dark' ? '🌙' : '☀️';
    });

    function basicAuth(u, p) {
      return 'Basic ' + btoa(u + ':' + p);
    }

    async function loadDashboard() {
      try {
        const [statsRes, usersRes] = await Promise.all([
          fetch(`${BACKEND_URL}/admin/stats`, { headers: { Authorization: basicAuth(adminCreds.u, adminCreds.p) } }),
          fetch(`${BACKEND_URL}/admin/users`, { headers: { Authorization: basicAuth(adminCreds.u, adminCreds.p) } })
        ]);
        if (statsRes.status === 401) throw new Error('Unauthorized');
        const stats = await statsRes.json();
        const usersData = await usersRes.json();

        document.getElementById('statTotal').textContent = stats.totalUsers;
        document.getElementById('statWatchlists').textContent = stats.totalWatchlists;
        document.getElementById('userCountBadge').textContent = `${stats.totalUsers} users`;

        const tbody = document.getElementById('usersTableBody');
        if (!usersData.users?.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:24px">No users yet</td></tr>';
          return;
        }

        tbody.innerHTML = usersData.users.map(u => `
          <tr>
            <td><strong style="color:var(--text-primary)">${escHtml(u.name)}</strong></td>
            <td>${escHtml(u.email)}</td>
            <td>${new Date(u.createdAt).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' })}</td>
            <td><span class="badge badge-green">Active</span></td>
            <td>
              <button class="btn-view" onclick="viewWatchlist('${u._id}','${escHtml(u.name)}')">📋 Watchlist</button>
              <button class="btn-del" onclick="deleteUser('${u._id}','${escHtml(u.email)}')">🗑 Delete</button>
            </td>
          </tr>
        `).join('');
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    async function viewWatchlist(userId, name) {
      try {
        const res = await fetch(`${BACKEND_URL}/admin/users/${userId}/watchlist`, {
          headers: { Authorization: basicAuth(adminCreds.u, adminCreds.p) }
        });
        const data = await res.json();
        const wl = data.watchlist?.lists || {};
        const listNames = ['list1','list2','list3','list4','list5','list6'];

        document.getElementById('wlModalTitle').textContent = `📋 ${name}'s Watchlists`;
        let html = '';
        listNames.forEach(key => {
          const list = wl[key];
          if (!list) return;
          const stocks = list.stocks || [];
          const label = list.label || key;
          html += `<div class="wl-list-name">${escHtml(label)} (${stocks.length} stocks)</div>`;
          if (stocks.length === 0) {
            html += `<div class="wl-empty">Empty</div>`;
          } else {
            stocks.forEach(s => { html += `<div class="wl-stock">• ${escHtml(s)}</div>`; });
          }
        });
        document.getElementById('wlModalBody').innerHTML = html || '<div class="wl-empty">No watchlist data</div>';
        document.getElementById('wlModal').classList.add('open');
      } catch (e) {
        alert('Error loading watchlist: ' + e.message);
      }
    }

    async function deleteUser(userId, email) {
      if (!confirm(`Delete user "${email}"? This cannot be undone.`)) return;
      try {
        const res = await fetch(`${BACKEND_URL}/admin/users/${userId}`, {
          method: 'DELETE',
          headers: { Authorization: basicAuth(adminCreds.u, adminCreds.p) }
        });
        if (!res.ok) throw new Error('Delete failed');
        loadDashboard();
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Admin login
    document.getElementById('adminLoginBtn').addEventListener('click', async () => {
      const u = document.getElementById('adminUser').value.trim();
      const p = document.getElementById('adminPass').value;
      const errDiv = document.getElementById('adminErr');
      errDiv.textContent = '';

      try {
        const res = await fetch(`${BACKEND_URL}/admin/stats`, {
          headers: { Authorization: basicAuth(u, p) }
        });
        if (res.status === 401) throw new Error('Invalid credentials');
        if (!res.ok) throw new Error('Server error');

        adminCreds = { u, p };
        document.getElementById('loginGate').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';
        document.getElementById('refreshBtn').style.display = '';
        document.getElementById('logoutBtn').style.display = '';
        loadDashboard();
      } catch (e) {
        errDiv.textContent = e.message;
      }
    });

    // Enter key on password
    document.getElementById('adminPass').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('adminLoginBtn').click();
    });

    document.getElementById('refreshBtn').addEventListener('click', loadDashboard);

    document.getElementById('logoutBtn').addEventListener('click', () => {
      adminCreds = null;
      document.getElementById('loginGate').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('refreshBtn').style.display = 'none';
      document.getElementById('logoutBtn').style.display = 'none';
      document.getElementById('adminUser').value = '';
      document.getElementById('adminPass').value = '';
    });

    document.getElementById('wlModalClose').addEventListener('click', () => {
      document.getElementById('wlModal').classList.remove('open');
    });

    document.getElementById('wlModal').addEventListener('click', e => {
      if (e.target === document.getElementById('wlModal'))
        document.getElementById('wlModal').classList.remove('open');
    });
  </script>
</body>
</html>
